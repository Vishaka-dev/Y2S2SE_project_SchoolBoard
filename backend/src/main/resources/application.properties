spring.application.name=SchoolBoard

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/school_board}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OAuth2 Client Configuration - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Application Configuration
app.frontend-url=${SCHOOLBOARD_FRONTEND_URL:http://localhost:5173}
app.base-url=${APP_BASE_URL:http://localhost:8080}
server.port=${SERVER_PORT:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/posts
file.profile-image-dir=uploads/profile-images

# Logging
logging.level.com.my_app.schoolboard=DEBUG
logging.level.org.springframework.security=DEBUG

springdoc.swagger-ui.path=/api-docs